server {
    listen 80;
    server_name mdgt.ru www.mdgt.ru;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name mdgt.ru www.mdgt.ru;


    error_page 503 504 /503_504.html;
    error_page 404     /404.html;


    ssl_certificate /etc/nginx/cert/crt.crt;
    ssl_certificate_key /etc/nginx/cert/key.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers HIGH:!aNULL:!MD5;


    root /usr/share/nginx/html;
    index index.html;


    location = /503_504.html {
        root /etc/nginx/cert;
        internal;
    }

    location = /404.html {
        root /etc/nginx/cert;
        internal;
    }


    location / {
        try_files $uri $uri/ =404;
    }


    location /hls/ {
        proxy_pass http://172.17.0.1:6767;

        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_redirect off;

        proxy_buffering off;
        proxy_request_buffering off;
        proxy_cache off;

        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # Проверка Let's Encrypt
    location ^~ /.well-known/acme-challenge/ {
        alias /var/www/letsencrypt/.well-known/acme-challenge/;
        try_files $uri =404;
    }
}
